# pdocker.service-url: 18081=llama.cpp
services:
  llama-cpp:
    build:
      context: .
      args:
        LLAMA_CPP_REF: "${LLAMA_CPP_REF:-master}"
    image: pdocker/llama-cpp-gpu:latest
    container_name: pdocker-llama-cpp
    gpus: all
    working_dir: /workspace
    environment:
      PDOCKER_GPU: "auto"
      PDOCKER_GPU_AUTO: "1"
      LLAMA_ARG_MODEL: "${LLAMA_ARG_MODEL:-/models/model.gguf}"
      LLAMA_ARG_CTX: "${LLAMA_ARG_CTX:-4096}"
      LLAMA_ARG_PORT: "${LLAMA_ARG_PORT:-18081}"
      LLAMA_ARG_THREADS: "${LLAMA_ARG_THREADS:-}"
      LLAMA_ARG_N_GPU_LAYERS: "${LLAMA_ARG_N_GPU_LAYERS:-}"
      LLAMA_EXTRA_ARGS: "${LLAMA_EXTRA_ARGS:-}"
      LLAMA_LOG_FILE: "${LLAMA_LOG_FILE:-/workspace/logs/llama-server.log}"
      LLAMA_MODEL_URL: "${LLAMA_MODEL_URL-https://huggingface.co/Qwen/Qwen3-8B-GGUF/resolve/main/Qwen3-8B-Q4_K_M.gguf}"
    command: ["/usr/local/bin/start-llama-server"]
    ports:
      - "18081:18081"
    volumes:
      - ./models:/models
      - ./workspace:/workspace
      - ./profiles:/profiles
