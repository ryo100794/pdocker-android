services:
  dev:
    build:
      context: .
      args:
        CODE_SERVER_VERSION: latest
        CODEX_NPM_PACKAGE: "@openai/codex"
    image: pdocker/dev-workspace:latest
    container_name: pdocker-dev
    working_dir: /workspace
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      CODE_SERVER_PASSWORD: "${CODE_SERVER_PASSWORD:-}"
    command: ["/usr/local/bin/start-code-server"]
    volumes:
      - ./workspace:/workspace
      - ./continue:/workspace/.continue
      - ./vscode:/workspace/.vscode-server/data/User
