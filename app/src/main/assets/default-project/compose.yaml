# pdocker.service-url: 18080=VS Code
# pdocker.auto-open: VS Code
services:
  dev:
    build:
      context: .
      args:
        CODE_SERVER_VERSION: latest
        CODEX_NPM_PACKAGE: "@openai/codex"
        CLAUDE_CODE_NPM_PACKAGE: "@anthropic-ai/claude-code"
    image: pdocker/dev-workspace:latest
    container_name: pdocker-dev
    gpus: all
    working_dir: /workspace
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      CODE_SERVER_PASSWORD: "${CODE_SERVER_PASSWORD:-}"
      CODE_SERVER_PORT: "${CODE_SERVER_PORT:-18080}"
      PDOCKER_GPU: "1"
    command: ["/usr/local/bin/start-code-server"]
    ports:
      - "18080:18080"
    volumes:
      - ./workspace:/workspace
      - ./continue:/workspace/.continue
      - ./vscode:/workspace/.vscode-server/data/User
