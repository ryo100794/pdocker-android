name: Implementation task
description: Track an internal implementation, test, or documentation task.
title: "Task: "
labels:
  - task
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What needs to change, and why?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
      description: Include file/module ownership and anything explicitly out of scope.
      render: text
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance checks
      description: Commands, device checks, artifact paths, or manual checks required to close.
      render: text
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Links to docs, issues, logs, agent findings, or benchmark artifacts.
      render: text
