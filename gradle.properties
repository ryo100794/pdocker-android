org.gradle.jvmargs=-Xmx1536m -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
# Force AGP to use our box64-wrapped aapt2 instead of extracting the
# x86_64 binary from its Maven transform cache (which fails on aarch64).
android.aapt2FromMavenOverride=/root/android-aapt2-agp/aapt2
